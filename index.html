<style>

/* FIX NAV OVERLAP */
body {
    padding-top: 90px;
}

/* NAV HOVER */
.nav-hover {
    position: relative;
    transition: 0.3s;
}

.nav-hover:hover {
    color: #0d6efd !important;
}

.nav-hover::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    left: 0;
    bottom: 0;
    background-color: #0d6efd;
    transition: 0.3s;
}

.nav-hover:hover::after {
    width: 100%;
}

/* LOGO */
.navbar-brand img {
    border-radius: 8px;
}

/* CARD IMAGE */
.card img {
    height: 200px;
    object-fit: cover;
}

/* GALLERY */
.gallery-item {
    overflow: hidden;
    border-radius: 10px;
}

.gallery-item img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    transition: 0.4s;
}

.gallery-item:hover img {
    transform: scale(1.1);
}

/* CAROUSEL */
.carousel-item img {
    height: 450px;
    object-fit: cover;
}

</style>

</head>
